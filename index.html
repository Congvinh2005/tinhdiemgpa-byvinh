<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Tính Điểm Nhanh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Bảng Tính Điểm <span>GPA</span></h1>

        <div class="input-section">
            <div class="options-section">
                <div class="mode-selection">
                    <label><input type="radio" name="calcMode" value="semester" checked onchange="toggleMode()"> Tính cả học kỳ</label>
                    <label><input type="radio" name="calcMode" value="single" onchange="toggleMode()"> Tính 1 môn</label>
                </div>
                <div class="method-selection">
                    <p>Chọn phương pháp tính điểm:</p>
                    <label class="method-row">
                        <input type="radio" name="calcMethod" value="1" checked>
                        <span>Phương pháp 1: 10% CC - 30% GK - 60% KT</span>
                        <span id="previewMethod1" class="preview-score">---</span>
                    </label>
                    <label class="method-row">
                        <input type="radio" name="calcMethod" value="2">
                        <span>Phương pháp 2: 20% CC - 30% GK - 50% KT</span>
                        <span id="previewMethod2" class="preview-score">---</span>
                    </label>
                    <label class="method-row">
                        <input type="radio" name="calcMethod" value="3">
                        <span>Phương pháp 3: 10% CC - 20% GK - 70% KT</span>
                        <span id="previewMethod3" class="preview-score">---</span>
                    </label>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Tên môn học</label>
                    <input type="text" id="subjectName" placeholder="Ví dụ: Toán cao cấp">
                </div>
                <div class="input-group">
                    <label>CC (Chuyên cần)</label>
                    <input type="number" id="cc" placeholder="0-10" min="0" max="10" step="0.1" oninput="updatePreviews()">
                </div>
                <div class="input-group">
                    <label>GK (Giữa kỳ)</label>
                    <input type="number" id="gk" placeholder="0-10" min="0" max="10" step="0.1" oninput="updatePreviews()">
                </div>
                <div class="input-group">
                    <label>KT (Cuối kỳ)</label>
                    <input type="number" id="kt" placeholder="0-10" min="0" max="10" step="0.1" oninput="updatePreviews()">
                </div>
                <div class="input-group" id="creditsGroup">
                    <label>Số tín</label>
                    <input type="number" id="credits" placeholder="1-10" min="1" max="10" step="1">
                </div>
                <button type="button" class="btn btn-update" id="calcBtn" onclick="calculateSingleSubject()">🧮 Tính điểm</button>
            </div>
            <div class="action-row" id="addBtnGroup" style="text-align: right; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn" style="background: transparent; color: #ffffff; border: 1px solid #ffffff;" onclick="resetForm()">🔄 Làm mới</button>
                <button type="button" class="btn btn-add" id="addBtn" onclick="handleAddOrUpdate()">➕ Thêm môn</button>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên môn</th>
                        <th>Số tín</th>
                        <th>CC</th>
                        <th>GK</th>
                        <th>KT</th>
                        <th>Điểm hệ 10</th>
                        <th>Điểm chữ</th>
                        <th>Điểm hệ 4</th>
                        <th>Xếp loại</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="gradeTable">
                    <tr>
                        <td colspan="11" style="text-align: center; color: #999; padding: 30px;">
                            Chưa có môn học nào. Hãy thêm môn học mới!
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="summary">
            <div class="summary-item">
                <div class="summary-label">Tổng số môn</div>
                <div class="summary-value" id="totalSubjects">0</div>
            </div>
            <div class="summary-item" id="summaryTotalCreditsItem">
                <div class="summary-label">Tổng số tín</div>
                <div class="summary-value" id="totalCredits">0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Điểm TB hệ 10</div>
                <div class="summary-value" id="avgGrade10">0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Điểm TB hệ 4</div>
                <div class="summary-value" id="avgGrade4">0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Xếp loại chung</div>
                <div class="summary-value" id="overallRank">---</div>
            </div>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 20px; padding: 10px; color: #1a1a1a; font-size: 0.9em;">
        <p>@Tính Điểm GPA UTT -Vinhdv</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
